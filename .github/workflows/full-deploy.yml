name: Full Deploy

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scrape mode'
        required: true
        default: 'backfill'
        type: choice
        options:
          - backfill
          - scrape

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-scrape:
    if: ${{ inputs.mode == 'scrape' }}
    uses: ./.github/workflows/scrape.yml

  run-backfill:
    if: ${{ inputs.mode == 'backfill' }}
    uses: ./.github/workflows/backfill.yml
    with:
      confirm: 'yes'

  deploy:
    needs: [run-scrape, run-backfill]
    if: ${{ always() && !failure() && !cancelled() }}
    uses: ./.github/workflows/deploy.yml
