name: Scrape Status Pages

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run scrape
      - name: Commit updated data
        run: |
          git config user.name "uptime-bot"
          git config user.email "bot@github-actions"
          git add data/
          git diff --staged --quiet || \
            git commit -m "data: scrape $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
