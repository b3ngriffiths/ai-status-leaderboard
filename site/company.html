<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company — AI Status Leaderboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="container inner">
    <div>
      <h1>AI Status Leaderboard</h1>
      <div class="tagline">Uptime &amp; reliability tracking for AI APIs and products</div>
    </div>
    <div class="meta">
      <span id="last-scraped">Loading…</span>
      <a href="https://github.com/b3ngriffiths/ai-status-leaderboard" target="_blank">GitHub ↗</a>
    </div>
  </div>
</header>

<main class="container">

  <a href="index.html" class="back-link">← Back to leaderboard</a>

  <!-- Company header -->
  <div class="company-header" id="company-header">
    <span class="skeleton" style="width:48px;height:48px;border-radius:8px;"></span>
    <div>
      <div><span class="skeleton" style="width:160px;height:20px;"></span></div>
      <div style="margin-top:6px"><span class="skeleton" style="width:80px;height:14px;"></span></div>
    </div>
    <div style="margin-left:auto">
      <span class="skeleton" style="width:100px;height:32px;"></span>
    </div>
  </div>

  <!-- Date range toggle -->
  <div style="padding:16px 0 8px">
    <div class="tab-group" id="range-tabs">
      <button class="tab" data-range="7">7 days</button>
      <button class="tab active" data-range="30">30 days</button>
      <button class="tab" data-range="90">90 days</button>
      <button class="tab" data-range="0">All time</button>
    </div>
  </div>

  <!-- Product cards -->
  <div class="section-title">Products</div>
  <div class="product-cards" id="product-cards">
    <div class="product-card"><div class="skeleton" style="width:100%;height:80px;"></div></div>
    <div class="product-card"><div class="skeleton" style="width:100%;height:80px;"></div></div>
  </div>

  <!-- Uptime calendars -->
  <div id="calendars-section"></div>

  <!-- Availability timeline -->
  <div class="section-title">Availability Timeline</div>
  <div class="timeline-wrap" id="timeline-wrap">
    <div style="padding:20px"><span class="skeleton" style="width:100%;height:120px;display:block;"></span></div>
  </div>

  <!-- Incident history -->
  <div class="section-title">Incident History</div>
  <div class="incident-table-wrap">
    <table id="incident-table">
      <thead>
        <tr>
          <th data-col="date">Date</th>
          <th data-col="product">Product</th>
          <th data-col="title">Title</th>
          <th data-col="duration">Duration</th>
          <th data-col="severity">Severity</th>
          <th>Link</th>
        </tr>
      </thead>
      <tbody id="incident-tbody">
        <tr><td colspan="6" style="color:var(--muted);text-align:center;padding:24px">Loading…</td></tr>
      </tbody>
    </table>
  </div>

</main>

<script src="app.js"></script>
</body>
</html>
